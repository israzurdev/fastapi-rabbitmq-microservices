version: '3.8'

services:
  # 1. El Broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: broker-mensajes
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - .env

  # 2. La API (Productor)
  api-pedidos:
    build:
      context: .
      dockerfile: servicio_pedidos/Dockerfile
    container_name: api-productor
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - rabbitmq

  # 3. El Trabajador (Consumidor)
  worker-notificaciones:
    build:
      context: .
      dockerfile: servicio_notificaciones/Dockerfile
    container_name: worker-consumidor
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1 # Para ver los prints en tiempo real
    depends_on:
      - rabbitmq